{{- if .Values.backend.env.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-backend-secrets
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  REPLICATE_API_TOKEN: {{ .Values.backend.env.replicateApiToken | default "" | quote }}
{{- end }}
