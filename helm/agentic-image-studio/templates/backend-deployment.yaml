apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: PORT
              value: "{{ .Values.backend.port }}"
            {{- range $name, $val := (.Values.backend.env.extra | default dict) }}
            {{- if $val }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.backend.env.createSecret }}
          envFrom:
            - secretRef:
                name: {{ include "app.fullname" . }}-backend-secrets
          {{- else if .Values.backend.env.existingSecretName }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.env.existingSecretName }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
